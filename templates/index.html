<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极限格斗 PVP 鬼灭之刀</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 玩家信息栏 -->
    <div id="player-bar" class="player-bar">
        <div class="player-bar-left">
            <span class="player-icon">🎮</span>
            <span id="player-display-name" class="player-display-name"></span>
            <span id="player-display-id" class="player-display-id"></span>
        </div>
        <div class="player-bar-right">
            <button id="btn-edit-name" class="btn btn-sm">✏️ 改名</button>
        </div>
    </div>

    <!-- 改名弹窗 -->
    <div id="name-modal" class="modal hidden">
        <div class="modal-content" style="max-width:360px;">
            <h3>修改显示名称</h3>
            <p style="font-size:12px;color:var(--text-dim);margin:8px 0;">ID 不可修改，名称可随时更改</p>
            <input type="text" id="new-player-name" maxlength="12" placeholder="输入新名称" style="margin-bottom:12px;">
            <div style="display:flex;gap:8px;">
                <button id="btn-save-name" class="btn btn-primary" style="flex:1;">💾 保存</button>
                <button id="btn-cancel-name" class="btn btn-secondary" style="flex:1;">取消</button>
            </div>
            <p id="name-error" class="error-message hidden"></p>
        </div>
    </div>

    <div id="app">
        <!-- 阶段1: 大厅 - 创建/加入房间 -->
        <div id="lobby-phase" class="phase active">
            <div class="title-section">
                <h1 class="game-title">⚔️ 极限格斗 PVP</h1>
                <h2 class="game-subtitle">鬼灭之刀</h2>
            </div>

            <div class="lobby-layout">
                <!-- 左侧：向导 -->
                <aside class="lobby-left">
                    <div id="guide-section" class="guide-section">
                        <div class="guide-header" id="guide-toggle">
                            <span class="guide-avatar">🦋</span>
                            <span class="guide-title">蝴蝶忍 · 虫柱导师</span>
                            <span class="guide-arrow">▲</span>
                        </div>
                        <div id="guide-body" class="guide-body">
                            <div id="guide-messages" class="guide-messages"></div>
                            <div class="guide-input-row">
                                <input type="text" id="guide-input" placeholder="请教导师..." maxlength="120">
                                <button id="btn-guide-send" class="btn btn-sm btn-primary">发送</button>
                            </div>
                            <div class="guide-actions">
                                <button id="btn-guide-clear" class="btn btn-sm">清除对话</button>
                            </div>
                        </div>
                    </div>
                </aside>

                <!-- 右侧：大厅 -->
                <main class="lobby-right">
                <div class="lobby-card">
                <div class="player-card">
                    <span class="player-card-icon">🎮</span>
                    <div class="player-card-info">
                        <span id="display-name" class="player-card-name"></span>
                        <span id="display-id" class="player-card-id"></span>
                    </div>
                    <button id="btn-edit-name-card" class="btn btn-sm">✏️</button>
                </div>

                <div class="lobby-buttons">
                    <button id="btn-create" class="btn btn-primary">
                        <span class="btn-icon">🏠</span> 创建房间
                    </button>
                    <button id="btn-single-player" class="btn btn-primary" style="background:#7b2d8b;">
                        <span class="btn-icon">🎮</span> 线下热座
                    </button>
                    <div class="divider">
                        <span>或</span>
                    </div>
                    <div class="join-section">
                        <input type="text" id="room-code-input" placeholder="输入6位房间码" maxlength="6" style="text-transform: uppercase;">
                        <button id="btn-join" class="btn btn-secondary">
                            <span class="btn-icon">🚪</span> 加入房间
                        </button>
                    </div>
                </div>

                <div id="room-info" class="room-info hidden">
                    <div class="room-code-display">
                        <span class="label">房间码：</span>
                        <span id="room-code-text" class="code-text"></span>
                    </div>
                    <p class="waiting-text">等待对手加入中...</p>
                    <div class="loading-spinner"></div>
                </div>

                <!-- 房间大厅 -->
                <div id="room-lobby" class="room-lobby">
                    <h3 class="lobby-title">🏠 可加入的房间</h3>
                    <div id="room-list" class="room-list">
                        <p class="room-empty">加载中...</p>
                    </div>
                    <button id="btn-refresh-rooms" class="btn btn-sm">🔄 刷新</button>
                </div>

                <div id="lobby-error" class="error-message hidden"></div>
            </div>
                </main>
            </div>
        </div>

        <!-- 阶段2: 选择技能 -->
        <div id="skill-phase" class="phase">
            <div class="title-section">
                <h2>选择出战技能</h2>
                <p id="character-info-text"></p>
            </div>

            <div class="skill-selection">
                <div id="skill-pool" class="skill-grid"></div>
                <div class="skill-select-info">
                    <p>已选择：<span id="selected-count">0</span> / <span id="required-count">3</span></p>
                    <button id="btn-confirm-skills" class="btn btn-primary" disabled>确认技能</button>
                </div>
            </div>

            <div id="skill-error" class="error-message hidden"></div>
            <p class="waiting-text hidden" id="waiting-opponent-skills">等待对手确认技能...</p>
        </div>

        <!-- 阶段3: 跳转提示 -->
        <div id="redirect-phase" class="phase">
            <div class="title-section">
                <h2>⚔️ 双方已就绪！</h2>
                <p>正在进入战场...</p>
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <script src="/static/player.js"></script>
    <script src="/static/battle-records.js"></script>
    <script src="/static/guide.js"></script>
    <script>
        // 工具函数 — 必须最先定义
        const $ = (id) => document.getElementById(id);

        // ========== 玩家系统 ==========
        function updatePlayerUI() {
            const name = Player.getName();
            const id = Player.getId();
            // 顶部栏
            const topName = $('player-display-name');
            const topId = $('player-display-id');
            if (topName) topName.textContent = name;
            if (topId) topId.textContent = '#' + id;
            // 大厅卡片
            const cardName = $('display-name');
            const cardId = $('display-id');
            if (cardName) cardName.textContent = name;
            if (cardId) cardId.textContent = 'ID: ' + id;
        }

        // 改名弹窗
        function openNameModal() {
            $('new-player-name').value = Player.getName();
            $('name-modal').classList.remove('hidden');
            $('name-error').classList.add('hidden');
        }

        // 两个改名按钮绑定同一个弹窗
        const editBtn1 = $('btn-edit-name');
        const editBtn2 = $('btn-edit-name-card');
        if (editBtn1) editBtn1.addEventListener('click', openNameModal);
        if (editBtn2) editBtn2.addEventListener('click', openNameModal);

        $('btn-cancel-name').addEventListener('click', () => {
            $('name-modal').classList.add('hidden');
        });

        $('btn-save-name').addEventListener('click', () => {
            const newName = $('new-player-name').value.trim();
            if (!newName) {
                $('name-error').textContent = '名称不能为空';
                $('name-error').classList.remove('hidden');
                return;
            }
            if (newName.length > 12) {
                $('name-error').textContent = '名称不能超过12个字符';
                $('name-error').classList.remove('hidden');
                return;
            }
            Player.setName(newName);
            $('name-modal').classList.add('hidden');
            updatePlayerUI();
        });

        $('new-player-name').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') $('btn-save-name').click();
        });

        $('name-modal').addEventListener('click', (e) => {
            if (e.target === $('name-modal')) $('name-modal').classList.add('hidden');
        });

        updatePlayerUI();

        // ========== 全局状态 ==========
        let ws = null;
        let roomCode = null;
        let playerId = null;
        let characterData = null;
        let isOffline = false;

        // 直接取缓存名字，不再读输入框
        function getPlayerName() {
            return Player.getName();
        }

        // ========== DOM 元素 ==========
        // ========== 阶段切换 ==========
        function showPhase(phaseName) {
            document.querySelectorAll('.phase').forEach(el => el.classList.remove('active'));
            const target = $(phaseName + '-phase');
            if (target) target.classList.add('active');
        }

        // ========== WebSocket 连接 ==========
        function connectWebSocket(room, pid) {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${location.host}/ws/${room}/${pid}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket 已连接');
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleMessage(msg);
            };

            ws.onclose = () => {
                console.log('WebSocket 已断开');
                showError('lobby-error', '连接已断开，请刷新页面重试');
            };

            ws.onerror = (err) => {
                console.error('WebSocket 错误:', err);
                showError('lobby-error', '连接失败，请检查网络');
            };
        }

        function send(msg) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(msg));
            }
        }

        // ========== 消息处理 ==========
        function handleMessage(msg) {
            console.log('收到消息:', msg);

            switch (msg.type) {
                case 'room_created':
                    roomCode = msg.room_code;
                    playerId = msg.player_id;
                    characterData = msg.character;
                    isOffline = msg.offline || false;
                    if (msg.single_player) {
                        // 单人模式：直接进入选技能
                        $('btn-create').disabled = true;
                        $('btn-join').disabled = true;
                        hideError('lobby-error');
                        showSkillSelection();
                    } else {
                        $('room-code-text').textContent = roomCode;
                        $('room-info').classList.remove('hidden');
                        $('btn-create').disabled = true;
                        $('btn-join').disabled = true;
                        hideError('lobby-error');
                    }
                    break;

                case 'room_joined':
                    roomCode = msg.room_code;
                    playerId = msg.player_id;
                    characterData = msg.character;
                    showSkillSelection();
                    break;

                case 'opponent_joined':
                    $('room-info').classList.add('hidden');
                    showSkillSelection();
                    break;

                case 'skills_confirmed':
                    $('btn-confirm-skills').disabled = true;
                    $('btn-confirm-skills').textContent = '已确认';
                    $('waiting-opponent-skills').classList.remove('hidden');
                    break;

                case 'game_start':
                    // 保存游戏状态到 sessionStorage，跳转到游戏页面
                    sessionStorage.setItem('gameState', JSON.stringify({
                        roomCode: roomCode,
                        playerId: playerId,
                        playerName: playerName,
                        offline: isOffline || false,
                    }));
                    showPhase('redirect');
                    setTimeout(() => {
                        const offlineParam = isOffline ? '&offline=1' : '';
                        window.location.href = `/game?room=${roomCode}&player=${playerId}${offlineParam}`;
                    }, 800);
                    break;

                case 'error':
                    showError('lobby-error', msg.message);
                    if (msg.message.includes('技能')) {
                        showError('skill-error', msg.message);
                    }
                    break;
            }
        }

        // ========== 技能选择 ==========
        let selectedSkills = new Set();

        function showSkillSelection() {
            showPhase('skill');

            if (characterData) {
                $('character-info-text').textContent =
                    `角色：${characterData.emoji} ${characterData.name}（${characterData.faction === 'human' ? '鬼杀队' : '鬼'}）`;

                const isDemon = characterData.faction === 'demon';
                $('required-count').textContent = isDemon ? '3（自动选择）' : '3';
                $('selected-count').textContent = isDemon ? '3' : '0';

                const pool = $('skill-pool');
                pool.innerHTML = '';

                characterData.skills.forEach((skill, index) => {
                    const card = document.createElement('div');
                    card.className = 'skill-card';
                    card.innerHTML = `
                        <div class="skill-name">${skill.name}</div>
                        <div class="skill-type">${getRangeTypeName(skill.range_type)}</div>
                        <div class="skill-damage">伤害：${skill.damage}</div>
                        <div class="skill-effects">${skill.effects.join(' · ')}</div>
                        <div class="skill-desc">${skill.description}</div>
                    `;

                    if (isDemon) {
                        card.classList.add('selected');
                        selectedSkills.add(index);
                    }

                    card.addEventListener('click', () => {
                        if (isDemon) return; // 鬼方自动全选

                        if (selectedSkills.has(index)) {
                            selectedSkills.delete(index);
                            card.classList.remove('selected');
                        } else if (selectedSkills.size < 3) {
                            selectedSkills.add(index);
                            card.classList.add('selected');
                        }

                        $('selected-count').textContent = selectedSkills.size;
                        $('btn-confirm-skills').disabled = selectedSkills.size !== 3;
                    });

                    pool.appendChild(card);
                });

                if (isDemon) {
                    $('btn-confirm-skills').disabled = false;
                }
            }
        }

        function getRangeTypeName(type) {
            const names = {
                'line': '直线',
                'self_aura': '自身光环',
                'square_3x3': '3×3正方形',
                'dash_surround': '位移环绕',
                'four_way': '四向',
                'multi_dash': '多向突进'
            };
            return names[type] || type;
        }

        // ========== 错误显示 ==========
        function showError(elementId, message) {
            const el = $(elementId);
            if (el) {
                el.textContent = message;
                el.classList.remove('hidden');
            }
        }

        function hideError(elementId) {
            const el = $(elementId);
            if (el) {
                el.classList.add('hidden');
            }
        }

        // ========== 线下模式 ==========
        $('btn-single-player').addEventListener('click', () => {
            playerName = getPlayerName();
            hideError('lobby-error');
            connectWebSocket('lobby', 0);
            const checkConnection = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    clearInterval(checkConnection);
                    send({
                        type: 'create_single_player',
                        player_name: playerName,
                        player_id: Player.getId(),
                    });
                }
            }, 100);
        });

        // ========== 事件绑定 ==========
        $('btn-create').addEventListener('click', () => {
            playerName = getPlayerName();
            if (!playerName) {
                showError('lobby-error', '请输入玩家名称');
                return;
            }
            hideError('lobby-error');
            connectWebSocket('lobby', 0);

            // 等待连接后发送创建房间消息
            const checkConnection = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    clearInterval(checkConnection);
                    send({ type: 'create_room', player_name: playerName, player_id: Player.getId() });
                }
            }, 100);
        });

        $('btn-join').addEventListener('click', () => {
            playerName = getPlayerName();
            const code = $('room-code-input').value.trim().toUpperCase();

            if (!playerName) {
                showError('lobby-error', '请输入玩家名称');
                return;
            }
            if (!code || code.length !== 6) {
                showError('lobby-error', '请输入6位房间码');
                return;
            }

            hideError('lobby-error');
            connectWebSocket(code, 1);

            const checkConnection = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    clearInterval(checkConnection);
                    send({ type: 'join_room', room_code: code, player_name: playerName, player_id: Player.getId() });
                }
            }, 100);
        });

        $('btn-confirm-skills').addEventListener('click', () => {
            if (selectedSkills.size !== 3 && characterData && characterData.faction !== 'demon') {
                showError('skill-error', '请选择3个技能');
                return;
            }

            hideError('skill-error');

            if (characterData && characterData.faction === 'demon') {
                // 鬼方自动发送全选
                send({ type: 'select_skills', skill_indices: [0, 1, 2] });
            } else {
                send({
                    type: 'select_skills',
                    skill_indices: Array.from(selectedSkills).sort()
                });
            }
        });

        // ========== 房间大厅 ==========
        async function refreshRoomList() {
            const list = $('room-list');
            if (!list) return;
            try {
                const resp = await fetch('/api/rooms');
                const data = await resp.json();
                if (data.rooms.length === 0) {
                    list.innerHTML = '<p class="room-empty">暂无房间，创建一个吧！</p>';
                } else {
                    list.innerHTML = data.rooms.map(r => {
                        const myId = Player.getId();
                        const isMine = r.host_player_id && r.host_player_id === myId;
                        const canJoin = !isMine && r.players < r.max_players && !r.in_game;
                        const empty = r.players === 0;
                        const full = r.players >= r.max_players || r.in_game;
                        const rowCls = isMine ? 'status-mine' : (empty ? 'status-empty' : (full ? (r.in_game ? 'status-ingame' : 'status-full') : 'status-waiting'));
                        const badgeText = r.in_game ? '对战中' : `${r.players}/${r.max_players}`;
                        const badgeCls = isMine ? 'mine' : (empty ? 'empty' : (r.in_game ? 'ingame' : (full ? 'full' : 'waiting')));
                        let extraInfo = '';
                        if (isMine) extraInfo = '<span class="room-own-tag">我的房间</span>';
                        else if (empty) extraInfo = `<span class="room-empty-tip">断开·${Math.floor(r.empty_seconds / 60)}分钟后清理</span>`;
                        return `
                        <div class="room-item ${rowCls}">
                            <div class="room-item-left">
                                <span class="room-item-code">${r.room_code}</span>
                                <span class="room-item-host">👤 ${r.host_name}</span>
                                <span class="room-item-time">${r.created_seconds_ago}秒前</span>
                                ${extraInfo}
                            </div>
                            <div class="room-item-right">
                                <span class="room-count-badge ${badgeCls}">${badgeText}</span>
                                ${canJoin
                                    ? `<button class="btn btn-sm btn-secondary join-room-btn" data-code="${r.room_code}">🚪 加入</button>`
                                    : `<button class="btn btn-sm" disabled>${isMine ? '我的' : (r.in_game ? '🔒' : (empty ? '离线' : '已满'))}</button>`
                                }
                            </div>
                        </div>
                    `}).join('');

                    list.querySelectorAll('.join-room-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            $('room-code-input').value = btn.dataset.code;
                            $('btn-join').click();
                        });
                    });
                }
            } catch (e) {
                list.innerHTML = '<p class="room-empty">加载失败</p>';
            }
        }

        $('btn-refresh-rooms').addEventListener('click', refreshRoomList);

        // 初始加载 + 每5秒自动刷新
        refreshRoomList();
        setInterval(refreshRoomList, 5000);

        // ========== 向导对话 ==========
        // 展开/折叠
        $('guide-toggle').addEventListener('click', () => {
            const body = $('guide-body');
            const arrow = document.querySelector('.guide-arrow');
            body.classList.toggle('hidden');
            if (arrow) arrow.textContent = body.classList.contains('hidden') ? '▼' : '▲';
        });

        // 显示问候
        function showGuideGreeting() {
            const msg = Guide.getGreeting();
            addGuideMessage('guide', msg);
        }

        function addGuideMessage(role, text) {
            const container = $('guide-messages');
            const div = document.createElement('div');
            div.className = role === 'guide' ? 'guide-msg guide-msg-guide' : 'guide-msg guide-msg-user';
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // 发送消息
        async function sendGuideMessage() {
            const input = $('guide-input');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            input.disabled = true;
            $('btn-guide-send').disabled = true;

            addGuideMessage('user', text);

            const reply = await Guide.chat(text);
            addGuideMessage('guide', reply);

            input.disabled = false;
            $('btn-guide-send').disabled = false;
            input.focus();
        }

        $('btn-guide-send').addEventListener('click', sendGuideMessage);
        $('guide-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendGuideMessage();
        });

        // 清除对话
        $('btn-guide-clear').addEventListener('click', () => {
            Guide.clearHistory();
            $('guide-messages').innerHTML = '';
            showGuideGreeting();
        });

        // 初始显示问候
        showGuideGreeting();

        // ========== 初始化 ==========
        console.log('⚔️ 极限格斗 PVP 鬼灭之刀 - 大厅已就绪');
    </script>
</body>
</html>
