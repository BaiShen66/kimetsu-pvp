services:
  - type: web
    name: kimetsu-pvp
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: GUIDE_API_KEY
        sync: false
      - key: GUIDE_API_URL
        value: https://api.deepseek.com/v1/chat/completions
      - key: GUIDE_MODEL
        value: deepseek-chat
